{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'accounts/images/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'accounts/css/register.css' %}">
    <title>Minium - Register</title>
</head>
<body>
    <main class="container">
        <h1>Join Minium.</h1>
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
        <form method="POST" class="register-form">
            {% csrf_token %}
            <div class="input-container">
                <label for="email" class="input-label">Your email</label>
                <input type="email" id="email" name="email" placeholder="Email" class="input-field" required>
            </div>
            <div class="input-container">
                <label for="username" class="input-label">Your username</label>
                <input type="text" id="username" name="username" placeholder="Username" class="input-field" required>
            </div>
            <div class="input-container">
                <label for="password" class="input-label">Your password</label>
                <input type="password" id="password" name="password" placeholder="Password" class="input-field" required>
            </div>
            <div class="input-container">
                <span class="input-label">Your birthday</span>
                <div class="date-container">
                    <div class="date-input-field">
                        <label for="month" class="input-label">Month</label>
                        <input type="number" id="month" name="month" placeholder="MM" class="date-input">
                    </div>
                    <div class="date-input-field">
                        <label for="day" class="input-label">Day</label>
                        <input type="number" id="day" name="day" placeholder="DD" class="date-input">
                    </div>
                    <div class="date-input-field">
                        <label for="year" class="input-label">Year</label>
                        <input type="number" id="year" name="year" placeholder="YYYY" class="date-input">
                    </div>
                </div>
            </div>
            <button class="submit-button" type="submit">Sign up</button>
        </form>
        <footer>Already have an account? <a href="{% url 'login' %}" class="anchor">Sign in</a></footer>
    </main>
</body>
</html>
